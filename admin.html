<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso Admin · KINETIC</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body class="admin-page page-bg--radial">
    <main class="admin-main">
      <div style="text-align: center">
        <div class="admin-brand">Kinetic</div>
        <p class="admin-kicker">Administración</p>
        <h1 class="admin-title">Acceso Admin</h1>
      </div>

      <div class="login-card">
        <div class="login-card__accent"></div>
        <div class="login-card__body">
          <form id="admin-login-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="adm-email">Correo electrónico</label>
              <input
                class="input"
                id="adm-email"
                name="email"
                type="email"
                autocomplete="username"
                placeholder="nombre@kinetic.com"
                required
              />
              <span class="form-error" data-error="email"></span>
            </div>
            <div class="form-group">
              <div class="form-row">
                <label class="form-label" for="adm-pass">Contraseña</label>
                <a class="link-accent" href="#">¿Olvidó su clave?</a>
              </div>
              <input
                class="input"
                id="adm-pass"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                minlength="8"
              />
              <span class="form-error" data-error="password"></span>
            </div>
            <button type="submit" class="btn btn--primary btn--block btn--lg">
              Acceder al Panel →
            </button>
            <p id="admin-login-status" class="form-error" style="margin-top: 1rem; color: #2e7d32" hidden></p>
          </form>
          <div class="login-card__divider">Seguridad corporativa</div>
          <div class="login-card__footer-links">
            <a href="index.html">Inicio</a>
            <a href="admin.html">🔒 Admin Only</a>
          </div>
        </div>
      </div>

      <p class="admin-support">
        ¿Problemas para ingresar? <strong>Contactar Soporte IT</strong>
      </p>
    </main>

    <footer class="site-footer" style="margin-top: 0">
      <div class="container site-footer__inner">
        <div>
          <div class="site-footer__brand">KINETIC</div>
          <p class="site-footer__copy">© 2026 KINETIC CORPORATE. TODOS LOS DERECHOS RESERVADOS.</p>
        </div>
        <nav class="site-footer__links">
          <a href="#">Privacidad</a>
          <a href="#">Términos</a>
          <a href="index.html#contacto">Soporte</a>
          <a href="#">Cookies</a>
        </nav>
        <div class="site-footer__icons">
          <button type="button" class="icon-btn" aria-label="Compartir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="18" cy="5" r="3" />
              <circle cx="6" cy="12" r="3" />
              <circle cx="18" cy="19" r="3" />
              <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" />
            </svg>
          </button>
          <button type="button" class="icon-btn" aria-label="Red">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <circle cx="12" cy="12" r="2" />
            </svg>
          </button>
        </div>
      </div>
    </footer>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
